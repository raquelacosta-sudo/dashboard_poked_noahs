name: Update Dashboard — Poked & Noah's GK

on:
  # Cada lunes a las 07:00 UTC (01:00 CDMX)
  schedule:
    - cron: "0 7 * * 1"

  # Permite ejecución manual desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1 — Checkout del repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3 — Dependencias
      - name: Install dependencies
        run: pip install snowflake-connector-python

      # 4 — Ejecutar el script de actualización
      - name: Run update_dashboard.py
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA:    ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
        run: python update_dashboard.py

      # 5 — Commit y push si el HTML cambió
      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_poked_noahs.html
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard $(date -u +%Y-%m-%d)"
          git push
